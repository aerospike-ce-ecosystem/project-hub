name: Hub Issue Planner
# ADR Proposal → AI 검토 (기각/보류/긍정) + ADR 문서 PR 생성
# Cross-Repo Issue → 각 repo별 구현 계획 수립
# Epic → Phase별 하위 태스크 분해
run-name: "Plan: ${{ github.event.issue.title }}"

on:
  issues:
    types: [labeled]

concurrency:
  group: hub-planner-${{ github.event.issue.number }}-${{ github.event.label.name }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────
  # ADR Proposal Review
  # ─────────────────────────────────────────────────
  adr-review:
    if: github.event.label.name == 'adr'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code - ADR Reviewer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          bot_id: '${{ vars.CLAUDE_BOT_ID }}'
          bot_name: '${{ vars.CLAUDE_BOT_NAME }}'
          prompt: |
            You are an **architecture review agent** for the Aerospike CE Ecosystem.
            Your role is to review ADR (Architecture Decision Record) proposals and provide one of three verdicts.

            ## Ecosystem Context
            - **aerospike-py**: Rust/PyO3 Python client. Build: `make build`, Test: `make test-unit`, Lint: `make lint`, Type: `make typecheck`
            - **aerospike-ce-kubernetes-operator (ACKO)**: Go/kubebuilder v4 Kubernetes operator. Build: `go build ./...`, Test: `make test-unit`, Lint: `make lint`
            - **aerospike-cluster-manager**: FastAPI backend (Python 3.13) + Next.js 16 frontend (React 19, Radix UI, Tailwind 4, Zustand)
            - **aerospike-ce-ecosystem-plugins**: Claude Code plugins (skills, agents, hooks)

            ## Task
            Review ADR Proposal issue #${{ github.event.issue.number }}.

            **Issue Title**: ${{ github.event.issue.title }}

            ### Instructions

            1. **Read the issue body** carefully — parse the fields:
               - 컨텍스트 (Context): why this decision is needed
               - 대안들 (Options): alternatives considered
               - 추천안 및 이유 (Recommendation): proposed approach
               - 결과 (Consequences): trade-offs
               - 관련 레포 (Related repos): checkboxes for affected repos

            2. **Read existing ADRs** in `docs/docs/architecture/adr/` to check for:
               - Conflicts with prior decisions
               - Precedents that inform this proposal
               - Patterns already established in the ecosystem

            3. **Read project goals** in `docs/docs/goals/project-design.md` and `docs/docs/goals/project-goals.md` to verify alignment.

            4. **Produce exactly ONE of three verdicts**:

               **REJECT (기각)** — Use when:
               - The proposal contradicts existing ADRs or project direction
               - It introduces unnecessary complexity without clear benefit
               - The alternatives are clearly superior to the recommendation
               - Technical constraints make it infeasible

               **DEFER (보류)** — Use when:
               - The trade-offs are too subjective for AI to judge (cost, team preference, political)
               - More information or benchmarks are needed before deciding
               - The proposal is reasonable but timing is wrong (depends on incomplete work)

               **POSITIVE REVIEW (긍정적 검토)** — Use when:
               - The proposal aligns with project goals and existing ADR direction
               - The recommendation is technically sound with acceptable trade-offs
               - **Human still makes the final decision** — this is advisory only

            5. **Post a comment** using `gh issue comment ${{ github.event.issue.number }}` with this exact structure:

            ```
            <!-- agent-plan-start -->
            ## ADR Review: [EMOJI] [REJECT / DEFER / POSITIVE REVIEW]

            ### 판단 요약
            [1-2 sentence Korean summary of verdict]

            ### 판단 근거
            [Detailed reasoning in Korean, referencing:
             - Specific existing ADRs (e.g., "ADR-0001 PyO3 선택과 일관성 있음")
             - Project goals alignment
             - Technical feasibility
             - Trade-off analysis]

            [IF POSITIVE REVIEW, add the following sections:]

            ### Repo별 영향 분석

            <!-- repo-plan:aerospike-py -->
            #### aerospike-py
            - **필요한 변경**: [구체적 설명]
            - **예상 범위**: Small / Medium / Large
            - **영향받는 파일/모듈**: [목록]
            <!-- /repo-plan:aerospike-py -->

            <!-- repo-plan:aerospike-ce-kubernetes-operator -->
            #### ACKO
            - **필요한 변경**: [구체적 설명]
            - **예상 범위**: Small / Medium / Large
            - **영향받는 파일/모듈**: [목록]
            <!-- /repo-plan:aerospike-ce-kubernetes-operator -->

            [... repeat only for repos checked in the issue ...]

            ### 제안 구현 순서
            1. [repo] — [이유]
            2. [repo] — [의존성 설명]

            <!-- repo-list: aerospike-py, aerospike-ce-kubernetes-operator -->

            [IF DEFER, add:]

            ### 인간 판단이 필요한 질문
            1. [구체적 질문]
            2. [구체적 질문]

            [IF REJECT, add:]

            ### 대안 제안
            - [기각 사유를 해결할 수 있는 대안이 있다면 제시]

            <!-- agent-plan-end -->
            ```

            6. **Add a label** based on verdict:
               - REJECT: `gh issue edit ${{ github.event.issue.number }} --add-label "adr-rejected"`
               - DEFER: `gh issue edit ${{ github.event.issue.number }} --add-label "adr-deferred"`
               - POSITIVE REVIEW: `gh issue edit ${{ github.event.issue.number }} --add-label "adr-positive"`

            7. **[ALL VERDICTS] Create ADR document and PR**

               Regardless of your verdict (REJECT, DEFER, or POSITIVE), you MUST create an ADR markdown document and submit it as a Pull Request. All architectural decisions — including rejections and deferrals — are valuable project history.

               a. **Determine the next ADR number**: List existing files in `docs/docs/architecture/adr/` and find the highest number. The existing files follow the pattern `YYYY-MM-DD-slug.md` with ADR numbers in the title (e.g., "ADR-0009"). Assign the next sequential number.

               b. **Create a new branch**:
                  ```bash
                  git checkout -b adr/issue-${{ github.event.issue.number }}-<short-slug>
                  ```

               c. **Create the ADR file** at `docs/docs/architecture/adr/YYYY-MM-DD-<slug>.md` using today's date. Set the **상태** field based on your verdict:
                  - REJECT → `**Rejected**`
                  - DEFER → `**Deferred**`
                  - POSITIVE REVIEW → `**Proposed**`

                  The file MUST follow this exact structure:

                  ```markdown
                  ---
                  title: "ADR-NNNN: <Title>"
                  description: <1-2 sentence description in Korean>
                  sidebar_position: <next number>
                  scope: <ecosystem or single-repo>
                  repos: [<affected repos>]
                  tags: [adr, <relevant tags>]
                  last_updated: YYYY-MM-DD
                  ---

                  # ADR-NNNN: <Title>

                  ## 상태

                  **Proposed / Rejected / Deferred**

                  - 제안일: YYYY-MM-DD
                  - 관련 이슈: aerospike-ce-ecosystem/project-hub#${{ github.event.issue.number }}
                  - 검토 결과: REJECT / DEFER / POSITIVE REVIEW
                  - 기각/보류 사유: [IF REJECT or DEFER: 1-2 sentence reason]

                  ## 맥락 (Context)

                  [Expand on the issue's context section with technical analysis]

                  ## 결정 (Decision)

                  > **[For POSITIVE: Clear statement of the decision]**
                  > **[For REJECT: 기각됨 — reason]**
                  > **[For DEFER: 보류됨 — what needs to be resolved first]**

                  [Detailed explanation]

                  ## 대안 (Alternatives Considered)

                  [List all options from the issue with pros/cons analysis]

                  ## 결과 (Consequences)

                  ### 긍정적
                  - [From issue + your analysis]

                  ### 부정적
                  - [From issue + your analysis]

                  ## 관련 ADR

                  - [Reference related existing ADRs you found during review]
                  ```

               d. **Commit and push**:
                  ```bash
                  git add docs/docs/architecture/adr/
                  git commit -m "docs(adr): add ADR-NNNN <title> (<status>)"
                  # where <status> is "proposed", "rejected", or "deferred"
                  git push origin adr/issue-${{ github.event.issue.number }}-<short-slug>
                  ```

               e. **Create PR** (adjust title/body based on verdict):
                  ```bash
                  gh pr create \
                    --title "docs(adr): ADR-NNNN <title> [<VERDICT>]" \
                    --body "## ADR 문서

                  Issue #${{ github.event.issue.number }} 의 ADR Proposal 검토 결과를 문서화합니다.

                  - **검토 결과**: <REJECT / DEFER / POSITIVE REVIEW>
                  - **상태**: <Rejected / Deferred / Proposed>
                  - **관련 Issue**: #${{ github.event.issue.number }}

                  ## 체크리스트
                  - [x] ADR 내용 검토 완료
                  - [x] 자동 머지됨" \
                    --label "adr"
                  ```

               f. **Merge the PR immediately** — ADR 문서 PR은 자동 생성된 문서이므로 추가 리뷰 없이 바로 머지합니다:
                  ```bash
                  gh pr merge --squash --delete-branch
                  ```

            ## Constraints
            - You MUST create an ADR document and PR for ALL verdicts (REJECT, DEFER, POSITIVE)
            - Human makes the final decision on ALL verdicts
            - Use Korean for all review content and ADR document, English for technical terms
            - Only include `<!-- repo-plan:... -->` sections for repos that are checked in the issue
            - The `<!-- repo-list: ... -->` line must list repos using their GitHub repository names (e.g., `aerospike-py`, `aerospike-ce-kubernetes-operator`, `aerospike-cluster-manager`, `aerospike-ce-ecosystem-plugins`)
          claude_args: |
            --max-turns ${{ vars.CLAUDE_MAX_TURNS }}
            --model ${{ vars.CLAUDE_MODEL }}
            --dangerously-skip-permissions
          settings: '${{ vars.CLAUDE_SETTINGS }}'

  # ─────────────────────────────────────────────────
  # Cross-Repo Issue Planning
  # ─────────────────────────────────────────────────
  cross-repo-plan:
    if: github.event.label.name == 'cross-repo'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code - Cross-Repo Planner
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          bot_id: '${{ vars.CLAUDE_BOT_ID }}'
          bot_name: '${{ vars.CLAUDE_BOT_NAME }}'
          prompt: |
            You are a **cross-repo planning agent** for the Aerospike CE Ecosystem.

            ## Ecosystem Context
            - **aerospike-py** (`aerospike-ce-ecosystem/aerospike-py`): Rust/PyO3 Python client. Build: `make build`, Test: `make test-unit`, Lint: `make lint`, Type: `make typecheck`
            - **ACKO** (`aerospike-ce-ecosystem/aerospike-ce-kubernetes-operator`): Go/kubebuilder v4 K8s operator. Build: `go build ./...`, Test: `make test-unit`, Lint: `make lint`
            - **Cluster Manager** (`aerospike-ce-ecosystem/aerospike-cluster-manager`): FastAPI backend + Next.js 16 frontend
            - **Plugins** (`aerospike-ce-ecosystem/aerospike-ce-ecosystem-plugins`): Claude Code plugins

            ## Merge Order Principle
            aerospike-py (base) → ACKO (operator) → cluster-manager (UI) → plugins (tools)

            ## Task
            Analyze cross-repo issue #${{ github.event.issue.number }} and create per-repo implementation plans.

            **Issue Title**: ${{ github.event.issue.title }}

            ### Instructions

            1. **Read the issue body** — parse:
               - 설명 (Description)
               - 관련 레포 checkboxes (checked = `[X]`)
               - 우선순위 (Priority: P0-P3)
               - 관련 이슈 링크

            2. **Map checked repos** to GitHub repo names:
               - "aerospike-py" → `aerospike-py`
               - "aerospike-ce-kubernetes-operator (ACKO)" → `aerospike-ce-kubernetes-operator`
               - "aerospike-cluster-manager" → `aerospike-cluster-manager`
               - "aerospike-ce-ecosystem-plugins" → `aerospike-ce-ecosystem-plugins`

            3. **For each selected repo**, use `gh api` to browse the codebase:
               - `gh api repos/aerospike-ce-ecosystem/{repo}/contents/{path}` to understand structure
               - Focus on files relevant to the issue

            4. **Post a plan comment** using `gh issue comment ${{ github.event.issue.number }}`:

            ```
            <!-- agent-plan-start -->
            ## Cross-Repo 구현 계획

            ### 이슈 요약
            [1-2 sentence summary]

            ### 우선순위: [P0/P1/P2/P3]

            ---

            <!-- repo-plan:aerospike-py -->
            ### aerospike-py
            **범위**: [변경 설명]

            | 파일 | 액션 | 설명 |
            |------|------|------|
            | `path/to/file` | Create/Modify | 설명 |

            **구현 단계**:
            1. [단계]
            2. [단계]

            **검증**: `make build && make test-unit && make lint`
            <!-- /repo-plan:aerospike-py -->

            [... repeat for each checked repo ...]

            ---

            ### 의존성 및 Merge 순서
            1. [repo] — [이유]
            2. [repo] — [의존성 설명]

            ### 리스크 평가
            - **Breaking changes**: Yes/No
            - **테스트 커버리지**: [필요한 테스트]
            - **의존성**: [새 의존성 여부]

            <!-- repo-list: aerospike-py, aerospike-ce-kubernetes-operator -->
            <!-- agent-plan-end -->
            ```

            5. **Add label**: `gh issue edit ${{ github.event.issue.number }} --add-label "plan-complete"`

            ## Constraints
            - Do NOT create branches, pull requests, or modify files in any repo
            - Do NOT create issues in sub-repos (the dispatcher will do that)
            - Your ONLY outputs are: one plan comment + one label
            - If the issue is too vague, add `needs-clarification` label and ask specific questions instead
            - Use Korean for descriptions, English for file paths and technical terms
          claude_args: |
            --max-turns ${{ vars.CLAUDE_MAX_TURNS }}
            --model ${{ vars.CLAUDE_MODEL }}
            --dangerously-skip-permissions
          settings: '${{ vars.CLAUDE_SETTINGS }}'

  # ─────────────────────────────────────────────────
  # Epic Breakdown Planning
  # ─────────────────────────────────────────────────
  epic-plan:
    if: github.event.label.name == 'epic'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code - Epic Planner
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          bot_id: '${{ vars.CLAUDE_BOT_ID }}'
          bot_name: '${{ vars.CLAUDE_BOT_NAME }}'
          prompt: |
            You are an **epic planning agent** for the Aerospike CE Ecosystem.

            ## Ecosystem Context
            - **aerospike-py** (`aerospike-ce-ecosystem/aerospike-py`): Rust/PyO3 Python client
            - **ACKO** (`aerospike-ce-ecosystem/aerospike-ce-kubernetes-operator`): Go/kubebuilder v4 K8s operator
            - **Cluster Manager** (`aerospike-ce-ecosystem/aerospike-cluster-manager`): FastAPI + Next.js 16
            - **Plugins** (`aerospike-ce-ecosystem/aerospike-ce-ecosystem-plugins`): Claude Code plugins

            ## Merge Order
            aerospike-py → ACKO → cluster-manager → plugins

            ## Task
            Break down Epic #${{ github.event.issue.number }} into phased sub-tasks per repo.

            **Issue Title**: ${{ github.event.issue.title }}

            ### Instructions

            1. **Read the issue body** — parse:
               - Epic 설명 (description)
               - 성공 기준 (success criteria)
               - 하위 태스크 (existing subtask links)
               - 관련 레포 checkboxes

            2. **Map checked repos** to GitHub repo names (same mapping as cross-repo).

            3. **For each selected repo**, use `gh api` to understand the codebase structure.

            4. **Decompose into phases** following the merge order principle.

            5. **Post a plan comment** using `gh issue comment ${{ github.event.issue.number }}`:

            ```
            <!-- agent-plan-start -->
            ## Epic 분해 계획

            ### Epic 요약
            [Summary]

            ### 성공 기준
            - [ ] [criteria from issue]

            ---

            ### Phase 1: [Phase 이름]

            <!-- repo-plan:aerospike-py -->
            #### aerospike-py — Task: [제목]
            **설명**: [standalone issue로 만들 수 있을 만큼 상세한 설명]
            **의존성**: 없음 / [다른 태스크 참조]
            **수락 기준**:
            - [ ] [criteria]
            **검증**: `make build && make test-unit`
            <!-- /repo-plan:aerospike-py -->

            <!-- repo-plan:aerospike-ce-kubernetes-operator -->
            #### ACKO — Task: [제목]
            **설명**: [설명]
            **의존성**: aerospike-py Phase 1
            **수락 기준**:
            - [ ] [criteria]
            **검증**: `go build ./... && make test-unit`
            <!-- /repo-plan:aerospike-ce-kubernetes-operator -->

            ### Phase 2: [Phase 이름]
            [... more tasks ...]

            ---

            ### 의존성 그래프
            ```
            Phase 1: aerospike-py ──→ Phase 2: cluster-manager
            Phase 1: ACKO ──→ Phase 2: cluster-manager
            ```

            ### 예상 작업량
            | Phase | Tasks | 예상 규모 |
            |-------|-------|----------|
            | Phase 1 | aerospike-py, ACKO | Medium |
            | Phase 2 | cluster-manager | Small |

            <!-- repo-list: aerospike-py, aerospike-ce-kubernetes-operator, aerospike-cluster-manager -->
            <!-- agent-plan-end -->
            ```

            6. **Add label**: `gh issue edit ${{ github.event.issue.number }} --add-label "plan-complete"`

            ## Constraints
            - Do NOT create branches, PRs, or modify files
            - Do NOT create issues in sub-repos (the dispatcher handles this)
            - Your ONLY outputs are: one plan comment + one label
            - If the epic is too vague, add `needs-clarification` label and ask questions instead
            - Each repo task description must be **self-contained** — sufficient to create a standalone issue
            - Use Korean for descriptions, English for technical terms
          claude_args: |
            --max-turns ${{ vars.CLAUDE_MAX_TURNS }}
            --model ${{ vars.CLAUDE_MODEL }}
            --dangerously-skip-permissions
          settings: '${{ vars.CLAUDE_SETTINGS }}'

  # ─────────────────────────────────────────────────
  # Skill Impact Review (core repo 변경 → plugins skill 업데이트 검토)
  # ─────────────────────────────────────────────────
  skill-impact-plan:
    if: github.event.label.name == 'skill-impact-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code - Skill Impact Analyzer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          bot_id: '${{ vars.CLAUDE_BOT_ID }}'
          bot_name: '${{ vars.CLAUDE_BOT_NAME }}'
          prompt: |
            You are a **skill impact analysis agent** for the Aerospike CE Ecosystem.
            Your role is to analyze core repo changes and determine what plugin skills need updating.

            ## Ecosystem Context
            - **aerospike-py** (`aerospike-ce-ecosystem/aerospike-py`): Rust/PyO3 Python client
            - **ACKO** (`aerospike-ce-ecosystem/aerospike-ce-kubernetes-operator`): Go/kubebuilder K8s operator
            - **Cluster Manager** (`aerospike-ce-ecosystem/aerospike-cluster-manager`): FastAPI + Next.js
            - **Plugins** (`aerospike-ce-ecosystem/aerospike-ce-ecosystem-plugins`): Claude Code plugin skills

            ## Skill ↔ Source File Mapping
            | Skill | Source Files |
            |-------|-------------|
            | aerospike-py-api | `__init__.pyi`, `errors.rs`, `lib.rs`, `list_operations.py`, `map_operations.py`, `exp.py`, `types.py` |
            | aerospike-py-fastapi | `__init__.pyi`, `errors.rs`, `types.py` |
            | acko-deploy | `aerospikecluster_types.go`, `aerospikecluster_webhook.go`, `types_*.go` |
            | acko-operations | `aerospikecluster_types.go`, `reconciler_status.go`, `reconciler_restart.go` |
            | acko-config-reference | `aerospikecluster_types.go`, `aerospikecluster_webhook.go` |
            | acko-cluster-debugger (agent) | `reconciler_status.go` |

            ## Task
            Analyze skill impact from core repo change reported in issue #${{ github.event.issue.number }}.

            **Issue Title**: ${{ github.event.issue.title }}

            ### Instructions

            1. **Parse the issue body** to extract:
               - Source repo name
               - Commit SHA
               - Changed files list
               - Pre-computed affected skills

            2. **Fetch the actual diff** from the source repo:
               ```
               gh api repos/aerospike-ce-ecosystem/{source-repo}/commits/{sha} --jq '.files[].patch'
               ```

            3. **For each affected skill**, read the current skill content from the plugins repo:
               ```
               gh api repos/aerospike-ce-ecosystem/aerospike-ce-ecosystem-plugins/contents/skills/{skill-name}/SKILL.md
               ```
               Also check relevant files in the `reference/` subdirectory.

            4. **Identify specific updates needed**:
               - Changed API signatures → update code examples and API docs
               - New/removed exceptions → update error handling examples
               - Changed CRD fields → update YAML examples and field docs
               - Changed phase names/events → update troubleshooting guides
               - Changed default values → update parameter reference tables

            5. **Post a plan comment** using `gh issue comment ${{ github.event.issue.number }}`:

            ```
            <!-- agent-plan-start -->
            ## Skill Impact Analysis

            ### Source 변경 요약
            [1-2 sentence summary of the core repo change]

            ### 영향 분석

            <!-- repo-plan:aerospike-ce-ecosystem-plugins -->
            #### aerospike-ce-ecosystem-plugins

            **영향받는 skills:**

            ##### 1. {skill-name}
            - **파일**: `skills/{skill-name}/SKILL.md` (또는 reference 파일)
            - **변경 필요**: [구체적 설명 — 어떤 코드 예제/API 시그니처/필드가 변경되어야 하는지]
            - **현재 값**: `[skill에 기록된 현재 내용]`
            - **새 값**: `[source repo에서 확인한 최신 내용]`

            [... repeat for each affected skill ...]

            **영향 없는 skills:** [해당사항 없으면 생략]
            - {skill-name}: [영향 없는 이유]
            <!-- /repo-plan:aerospike-ce-ecosystem-plugins -->

            ### 구현 순서
            1. [skill-name] — [이유]

            <!-- repo-list: aerospike-ce-ecosystem-plugins -->
            <!-- agent-plan-end -->
            ```

            6. If NO skill updates are needed (internal-only change):
               - Post a comment: "분석 결과, 이 변경은 plugin skill에 영향을 주지 않습니다. [이유]"
               - Close the issue: `gh issue close ${{ github.event.issue.number }}`
               - Do NOT add `plan-complete` label

            7. If updates ARE needed:
               - Add `plan-complete` label: `gh issue edit ${{ github.event.issue.number }} --add-label "plan-complete"`

            ## Constraints
            - Do NOT create branches, PRs, or modify files in any repo
            - Do NOT create issues in sub-repos (the dispatcher handles that)
            - Your ONLY outputs are: one analysis comment + label (or close)
            - Compare **actual content** — do not guess based on file names alone
            - Use Korean for descriptions, English for technical terms
